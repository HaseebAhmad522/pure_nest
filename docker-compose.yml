services:
  db:
    image: postgres:16-alpine
    container_name: pure_nest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pure_nest_db
      POSTGRES_USER: pure_nest_user
      POSTGRES_PASSWORD: pure_nest_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pure_nest_user -d pure_nest_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: pure_nest_web
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
